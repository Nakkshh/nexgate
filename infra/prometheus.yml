global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nexgate-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["gateway:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "gateway"

  - job_name: "nexgate-consumer"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["consumer:8082"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "consumer"

  - job_name: "nexgate-mock-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["mock-backend:8081"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mock-backend"
