version: "3.9"

services:

  # ─── Infrastructure ───────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nexgate-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexgate-kafka
    restart: on-failure
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: internal (kafka:29092) and external (localhost:9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 60000      
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 60000
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexgate-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: nexgate-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7.2-alpine
    container_name: nexgate-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local PostgreSQL — only used in dev (prod = NeonDB)
  postgres:
    image: postgres:16-alpine
    container_name: nexgate-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexgate
      POSTGRES_USER: nexgate
      POSTGRES_PASSWORD: nexgate
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexgate"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nexgate-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:10.4.0
    container_name: nexgate-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ─── Application Services ─────────────────────────────────────

  mock-backend:
    build:
      context: ./mock-backend
      dockerfile: Dockerfile
    container_name: nexgate-mock-backend
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: nexgate-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      # Use local postgres for dev; swap DATABASE_URL with NeonDB for prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/nexgate
      DATABASE_USERNAME: nexgate
      DATABASE_PASSWORD: nexgate
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MOCK_BACKEND_URL: http://mock-backend:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-backend:
        condition: service_started

  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: nexgate-consumer
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DATABASE_URL: jdbc:postgresql://postgres:5432/nexgate
      DATABASE_USERNAME: nexgate
      DATABASE_PASSWORD: nexgate
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
